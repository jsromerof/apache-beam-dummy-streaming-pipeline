kafka:
  consumer:
    config:
      bootstrap.servers: 'pkc-lgk0v.us-west1.gcp.confluent.cloud:9092'
      sasl.jaas.config: 'org.apache.kafka.common.security.plain.PlainLoginModule required serviceName="Kafka" username="{}" password="{}";'
      security.protocol: 'SASL_SSL'
      sasl.mechanism: 'PLAIN'
      auto.offset.reset: 'latest'
      default.api.timeout.ms: '120000'
    secret:
      name: 'global_supplier_mdm_kafka'
      version: 'latest'
    topics:
      - topic: "leyland_topic"
        consumer_group: 'leyland_consumer_group'
        standardization_mapping_file: "pipelines/global_supplier_to_retio/schema_standardization/leyland_mapping.yaml"
      - topic: "australia_topic"
        consumer_group: "australia_consumer_group"
        standardization_mapping_file: "pipelines/global_supplier_to_retio/schema_standardization/australia_mapping.yaml"

alloydb:
  database: 
    lineage: 'lineage'
  host: 'pos-d-ctd.enterprisedb.dev.cloud'
  port: 5432
  secret:
    name: 'global_supplier_mdm_alloydb'
    version: 'latest'